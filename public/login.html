<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EconoMuebles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #121212; /* Fondo oscuro premium */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: #1e1e1e; /* Tarjeta gris oscuro elegante */
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #2e2e2e;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

            .login-box h2 {
                color: #ffffff;
                margin-bottom: 25px;
                font-weight: 600;
                font-size: 1.6rem;
                letter-spacing: 0.5px;
            }

            .login-box input {
                width: 100%;
                padding: 12px 15px;
                margin: 10px 0;
                border: 1px solid #333;
                border-radius: 6px;
                background: #2a2a2a;
                color: #ffffff;
                font-size: 0.95rem;
                transition: border-color 0.2s ease;
            }

                .login-box input:focus {
                    outline: none;
                    border-color: #eab308; /* Brillo amarillo al escribir */
                }

            .login-box button {
                width: 100%;
                padding: 12px;
                background: #eab308; /* Botón amarillo institucional */
                color: #121212;
                border: none;
                border-radius: 6px;
                font-size: 1rem;
                font-weight: bold;
                cursor: pointer;
                margin-top: 15px;
                transition: background 0.2s ease, transform 0.1s ease;
            }

                .login-box button:hover {
                    background: #ca9306;
                }

                .login-box button:active {
                    transform: translateY(1px);
                }

            .login-box a {
                display: block;
                text-align: center;
                margin-top: 20px;
                color: #a0aec0;
                text-decoration: none;
                font-size: 0.85rem;
                transition: color 0.2s ease;
            }

                .login-box a:hover {
                    color: #eab308; /* Resalta en amarillo en hover */
                    text-decoration: underline;
                }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>EconoMuebles</h2>
        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuario" required>

            <div style="position: relative; display: flex; align-items: center; width: 100%;">
                <input type="password" id="password" placeholder="Contraseña" required
                       style="padding-right: 45px; margin: 10px 0;">
                <i class="fa-solid fa-eye-slash" id="toggleLoginPassword" onclick="toggleVisibilidadLogin()"
                   style="position: absolute; right: 15px; cursor: pointer; color: #a0aec0; font-size: 1.1rem; user-select: none;"></i>
            </div>

            <button type="submit">Entrar al Sistema</button>

            <a href="soporte.html">¿Olvidaste tu contraseña?</a>
        </form>
    </div>

    <script>
        // Función para ocultar y mostrar la contraseña
        function toggleVisibilidadLogin() {
            const inputPass = document.getElementById('password');
            const iconoPass = document.getElementById('toggleLoginPassword');

            if (inputPass.type === "password") {
                inputPass.type = "text";
                iconoPass.className = "fa-solid fa-eye";
                iconoPass.style.color = "#eab308"; // Se pone amarillo corporativo al mostrarse
            } else {
                inputPass.type = "password";
                iconoPass.className = "fa-solid fa-eye-slash";
                iconoPass.style.color = "#a0aec0"; // Regresa al gris claro al ocultarse
            }
        }

        const form = document.getElementById('loginForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const datos = {
                usuario: document.getElementById('usuario').value,
                password: document.getElementById('password').value
            };

            try {
                const resp = await fetch('http://localhost:4000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                const resultado = await resp.json();

                if (resultado.ok) {
                    window.location.href = "admin.html";
                } else {
                    alert(resultado.mensaje || "Usuario o contraseña incorrectos");
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor.");
            }
        });
    </script>

    <script>
        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página se recargue

            const usuario = document.querySelector('input[name="usuario"]').value;
            const password = document.querySelector('input[name="password"]').value;

            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ usuario, password })
            });

            const data = await response.json();
            if (data.ok) {
                window.location.href = '/admin'; // Si entra, te manda al admin
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        });
    </script>


</body>
</html>
