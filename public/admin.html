<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administradores</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <header class="navbar-superior">
        <div class="navbar-contenido">

            <div class="navbar-logo">
                <img src="images/logo.png" alt="Logo Econo Muebles">
                <span class="badge-admin">Administración</span>
            </div>

            <div class="buscador-contenedor">
                <input type="text" id="buscar" placeholder="Buscar producto...">
                <button id="btn-regresar" onclick="cargarProductos()" style="display:none;">Ver Todos</button>
            </div>

            <div class="navbar-derecha">
                <a href="index.html" target="_blank" class="btn-ver-tienda">
                    <i class="fa-solid fa-store"></i> Ver Tienda
                </a>

                <div class="menu-icon" onclick="toggleMenu()">☰</div>
            </div>
        </div>

        <nav id="categorias-nav"></nav>
    </header>

    <div class="navbar-espaciador"></div>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="toggleMenu()">X</a>
        <div class="sidebar-header">
            <h3>Operaciones</h3>
        </div>
        <button onclick="abrirModalAgregar()"><i class="fa-solid fa-plus"></i> Agregar Producto</button>
        <button onclick="toggleGestionCategorias()"><i class="fa-solid fa-folder-gear"></i> Gestionar Categorías</button>

        <button onclick="window.location.href='manual.html'"><i class="fa-solid fa-book"></i> Manual de Usuario</button>

        <button onclick="abrirModalPassword()"><i class="fa-solid fa-key"></i> Seguridad</button>

        <button onclick="cerrarSesion()" class="btn-cerrar-sesion"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
    </div>

    <div class="main-content">
        <div id="listaCategorias"></div>
    </div>

    <div id="modalMueble" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalMueble()">&times;</span>
            <h2 id="modalTitulo">Nuevo Producto</h2>

            <form id="formMueble">
                <div class="form-grupo">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" placeholder="Ej. Comedor" required>
                </div>

                <div class="form-grupo">
                    <label for="categoriaSelect">Categoría</label>
                    <select id="categoriaSelect" required></select>
                </div>

                <div id="contenedorOtro" style="display: none; margin-top: -5px; margin-bottom: 15px;">
                    <input type="text" id="nuevaCategoriaInput" placeholder="Escribe el nombre de la nueva categoría...">
                </div>

                <div class="form-grupo">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" placeholder="Detalles del producto, mensaje, dimensiones, acabados..."></textarea>
                </div>

                <div class="form-grupo">
                    <label for="inputImagen" class="label-archivo">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Seleccionar Imagen o Video
                    </label>
                    <input type="file" id="inputImagen" accept="image/*,video/*">
                </div>

                <div id="contenedorPreview" style="margin: 15px 0; text-align: center; display: none;">
                    <label style="display: block; font-weight: 600; margin-bottom: 8px; text-align: left; font-size: 0.9rem; color: #475569;">Vista Previa Actual:</label>
                    <img id="imgPreview" src="" alt="Vista previa imagen" style="max-width: 100%; max-height: 200px; border-radius: 8px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
                    <video id="videoPreview" src="" controls style="max-width: 100%; max-height: 200px; border-radius: 8px; display: none; box-shadow: 0 2px 8px rgba(0,0,0,0.15);"></video>
                </div>

                <button type="submit" class="btn-guardar">
                    <i class="fa-solid fa-save"></i> Guardar Producto
                </button>
            </form>
        </div>
    </div>

    <div id="modalCategorias" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModalCategorias()">&times;</span>
            <h2>Gestionar Categorías</h2>

            <form id="formCategorias" class="form-inline-categorias">
                <input type="text" id="nuevaCategoria" placeholder="Nombre de la nueva categoría" required>
                <button type="submit" class="btn-guardar-inline">Agregar</button>
            </form>

            <div id="listaCategoriasAdmin"></div>
        </div>
    </div>

    <div id="modalPassword" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 450px; border-radius: 12px; padding: 30px;">
            <span class="close" onclick="cerrarModalPassword()">&times;</span>
            <h2 style="font-size: 1.7rem; font-weight: 700; margin-bottom: 8px; color: #0f172a;">Configuración de Seguridad</h2>
            <p style="color: #64748b; margin-bottom: 25px; font-size: 1rem; line-height: 1.4;">
                Actualice la contraseña del canal de acceso diario (<strong>adEconoM</strong>).
            </p>

            <form id="formCambioPassword" onsubmit="event.preventDefault();">
                <div class="form-grupo" style="margin-bottom: 20px;">
                    <label for="nueva_clave" style="font-size: 1.1rem; font-weight: 600; display: block; margin-bottom: 8px;">Nueva Contraseña</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="nueva_clave" placeholder="Escriba la nueva contraseña"
                               style="width: 100%; padding: 14px 45px 14px 14px; font-size: 1.15rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                        <i class="fa-solid fa-eye-slash" id="toggleNuevaClave" onclick="toggleVisibilidad('nueva_clave', 'toggleNuevaClave')"
                           style="position: absolute; right: 15px; cursor: pointer; color: #64748b; font-size: 1.2rem;"></i>
                    </div>
                </div>

                <div class="form-grupo" style="margin-bottom: 28px;">
                    <label for="confirmar_clave" style="font-size: 1.1rem; font-weight: 600; display: block; margin-bottom: 8px;">Confirmar Contraseña</label>
                    <div style="position: relative; display: flex; align-items: center;">
                        <input type="password" id="confirmar_clave" placeholder="Repita la nueva contraseña"
                               style="width: 100%; padding: 14px 45px 14px 14px; font-size: 1.15rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box;">
                        <i class="fa-solid fa-eye-slash" id="toggleConfirmarClave" onclick="toggleVisibilidad('confirmar_clave', 'toggleConfirmarClave')"
                           style="position: absolute; right: 15px; cursor: pointer; color: #64748b; font-size: 1.2rem;"></i>
                    </div>
                </div>

                <button type="button" onclick="procesarCambioPassword()" class="btn-guardar"
                        style="width: 100%; padding: 15px; font-size: 1.1rem; font-weight: 700; background: #eab308; color: #121212; border: none; border-radius: 6px; cursor: pointer;">
                    Guardar Nueva Contraseña
                </button>
            </form>
        </div>
    </div>

    <footer class="admin-footer">
        <p>© 2026 EconoMuebles. Panel de Gestión.</p>
    </footer>

    <script src="admin.js"></script>

    <script>
        const modalContenedor = document.getElementById('modalPassword');
        if (modalContenedor) {
            modalContenedor.addEventListener('input', function (e) {
                e.stopPropagation();
            });
            modalContenedor.addEventListener('keydown', function (e) {
                e.stopPropagation();
            });
        }

        function abrirModalPassword() {
            document.getElementById('nueva_clave').value = '';
            document.getElementById('confirmar_clave').value = '';
            resetearOjos();
            document.getElementById('modalPassword').style.display = 'block';
            toggleMenu();
        }

        function cerrarModalPassword() {
            document.getElementById('modalPassword').style.display = 'none';
            document.getElementById('nueva_clave').value = '';
            document.getElementById('confirmar_clave').value = '';
        }

        function toggleVisibilidad(inputId, iconoId) {
            const input = document.getElementById(inputId);
            const icono = document.getElementById(iconoId);

            if (input.type === "password") {
                input.type = "text";
                icono.className = "fa-solid fa-eye";
                icono.style.color = "#eab308";
            } else {
                input.type = "password";
                icono.className = "fa-solid fa-eye-slash";
                icono.style.color = "#64748b";
            }
        }

        function resetearOjos() {
            document.getElementById('nueva_clave').type = "password";
            document.getElementById('confirmar_clave').type = "password";
            document.getElementById('toggleNuevaClave').className = "fa-solid fa-eye-slash";
            document.getElementById('toggleNuevaClave').style.color = "#64748b";
            document.getElementById('toggleConfirmarClave').className = "fa-solid fa-eye-slash";
            document.getElementById('toggleConfirmarClave').style.color = "#64748b";
        }

        async function procesarCambioPassword() {
            const nuevaClave = document.getElementById('nueva_clave').value;
            const confirmarClave = document.getElementById('confirmar_clave').value;

            if (nuevaClave.trim() === "" || confirmarClave.trim() === "") {
                alert("Por favor, complete ambos campos de contraseña.");
                return;
            }

            if (nuevaClave !== confirmarClave) {
                alert("Las contraseñas no coinciden. Verifique e intente de nuevo.");
                return;
            }

            if (nuevaClave.length < 5) {
                alert("Por seguridad, la contraseña debe tener al menos 5 caracteres.");
                return;
            }

            const confirmar = confirm("¿Estás seguro de que deseas cambiar la contraseña del usuario diario (adEM)?");
            if (!confirmar) return;

            try {
                const respuesta = await fetch('/cambiar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nuevoPassword: nuevaClave })
                });

                const data = await respuesta.json();

                if (data.ok) {
                    alert("¡Contraseña cambiada con éxito! El canal diario ha sido actualizado.");
                    cerrarModalPassword();

                    const buscador = document.getElementById('buscar');
                    if (buscador) {
                        buscador.value = '';
                        if (typeof cargarProductos === 'function') cargarProductos();
                    }
                } else {
                    alert("Error: " + data.mensaje);
                }
            } catch (error) {
                alert("No se pudo conectar con el servidor.");
            }
        }
    </script>

    <div id="modalConfirmacion" class="modal-confirm-fondo">
        <div class="modal-confirm-caja">
            <p id="modalConfMensaje" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 25px;"></p>
            <div class="modal-confirm-botones">
                <button id="btnConfNo" class="btn-editar">Cancelar</button>
                <button id="btnConfSi" class="btn-guardar" style="margin-top:0;">Confirmar</button>
            </div>
        </div>
    </div>

</body>
</html>
